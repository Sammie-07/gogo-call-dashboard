name: Sync GHL data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run sync
        env:
          GHL_PIT: ${{ secrets.GHL_PIT }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
        run: npm run sync

      - name: Commit snapshot if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/snapshot.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-sync GHL snapshot ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
